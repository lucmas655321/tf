name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install mcp
      - name: Run CLI tests
        run: python3 test/run_cli.py --fails
      - name: Run MCP tests
        run: python3 test/run_mcp.py --fails
      - name: Run trees tests
        run: python3 test/run_trees.py --fails
